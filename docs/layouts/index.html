{{- $target := "en/" | relURL -}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url={{ $target }}">
    <link rel="canonical" href="{{ $target }}">
    <title>Redirecting to About | {{ site.Title }}</title>
    <script>
      window.location.replace("{{ $target }}");
    </script>
  </head>
  <body>
    <p><a href="{{ $target }}">Continue to About.</a></p>
  </body>
</html>
